version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agentic_db_postgres
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: dropout_prevention
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6.0
    container_name: agentic_db_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ai_admin
      MONGO_INITDB_ROOT_PASSWORD: ai_admin_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  influxdb:
    image: influxdb:2.7
    container_name: agentic_db_influx
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ai_admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ai_admin_password
      DOCKER_INFLUXDB_INIT_ORG: agentic_ai
      DOCKER_INFLUXDB_INIT_BUCKET: student_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecret_influx_token_123
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: agentic_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: agentic_kafka
    depends_on:
      - zookeeper
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  mongo_data:
  influxdb_data:
